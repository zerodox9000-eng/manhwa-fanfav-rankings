<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050506" />
    <meta
      name="description"
      content="A calm mobile-first manhwa discovery app powered by AniList mean score, Fan Fav percentage, popularity, and growth."
    />
    <title>ManhwaLens</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="topbar">
        <div class="topbar__main">
          <h1>ManhwaLens</h1>
          <button class="icon-btn" id="search-open" type="button" aria-label="Search">Search</button>
        </div>
        <button class="feed-select" id="feed-select" type="button">
          <span>Active Feed</span>
          <strong id="active-feed-name">Hidden Gems</strong>
        </button>
      </header>

      <main class="screen" id="screen">
        <section class="feed-header">
          <div>
            <h2 id="feed-title">Hidden Gems</h2>
            <p id="feed-description"></p>
          </div>
          <button class="ghost-btn" id="feed-menu" type="button">Edit</button>
        </section>

        <section class="rule-row" id="rule-row" aria-label="Active feed rules"></section>
        <section class="quick-controls" id="quick-controls" aria-label="Quick controls"></section>
        <section class="feed-list" id="feed-list" aria-live="polite"></section>
        <button class="load-more hidden" id="load-more" type="button">Load more</button>
      </main>

      <nav class="bottom-nav" aria-label="Navigation">
        <button class="nav-btn is-active" type="button" data-view="home">Home</button>
        <button class="nav-btn" type="button" data-view="feeds">Feeds</button>
        <button class="nav-btn nav-btn--plus" id="create-feed" type="button" aria-label="Create feed">+</button>
        <button class="nav-btn" type="button" data-view="library">Library</button>
        <button class="nav-btn" type="button" data-view="search">Search</button>
      </nav>
    </div>

    <div class="backdrop hidden" id="backdrop"></div>

    <aside class="sheet detail-sheet" id="detail-sheet" aria-hidden="true">
      <div class="sheet__grabber"></div>
      <div class="sheet__scroller" id="detail-content"></div>
    </aside>

    <aside class="sheet picker-sheet" id="picker-sheet" aria-hidden="true">
      <div class="sheet__grabber"></div>
      <div class="sheet__scroller" id="picker-content"></div>
    </aside>

    <section class="flow hidden" id="feed-flow" aria-hidden="true">
      <div class="flow__top">
        <button class="icon-btn" id="flow-close" type="button">Back</button>
        <h2 id="flow-title">Create Feed</h2>
        <button class="ghost-btn" id="flow-save" type="button">Save</button>
      </div>
      <div class="flow__steps" id="flow-steps"></div>
      <div class="flow__body" id="flow-body"></div>
    </section>

    <template id="entry-template">
      <button class="entry-card" type="button">
        <span class="entry-card__rank"></span>
        <span class="entry-card__label hidden"></span>
        <span class="entry-card__save"></span>
        <div class="entry-card__cover"></div>
        <div class="entry-card__body">
          <h3></h3>
          <p class="entry-card__meta"></p>
          <div class="entry-card__metrics">
            <span><b class="metric-mean"></b><small>Mean</small></span>
            <span><b class="metric-fan"></b><small>Fan Fav</small></span>
            <span><b class="metric-pop"></b><small>Pop</small></span>
          </div>
        </div>
      </button>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
