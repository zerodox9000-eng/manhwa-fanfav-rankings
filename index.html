<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Daily AniList manhwa discovery powered by Fan Fav %, mean score, growth history, and glass-style mobile filters."
    />
    <title>Peakhwa Discovery</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <header class="topbar">
        <div class="brand-row">
          <div>
            <p class="eyebrow">Peakhwa</p>
            <h1>Manhwa discovery</h1>
          </div>
          <button class="icon-button" id="theme-button" type="button" aria-label="Change theme">Noir</button>
        </div>

        <label class="search-box" for="search-input">
          <span class="search-box__icon" aria-hidden="true">Find</span>
          <input id="search-input" type="search" autocomplete="off" spellcheck="false" placeholder="Search titles, tags, genres" />
        </label>

        <div class="rail rail--tabs" id="discovery-tabs" aria-label="Discovery mode"></div>
        <div class="rail rail--time" id="time-tabs" aria-label="Growth window"></div>
      </header>

      <main class="content">
        <section class="status-strip glass-panel" id="status-strip">
          <div>
            <span id="page-label">Discovery</span>
            <strong id="result-count">Loading</strong>
          </div>
          <div>
            <span>Snapshot</span>
            <strong id="snapshot-updated">...</strong>
          </div>
        </section>

        <section class="quick-row" id="quick-row" aria-label="Active quick filters"></section>
        <section class="feed" id="feed" aria-live="polite"></section>
        <button class="load-more hidden" id="load-more" type="button">Load more</button>
      </main>

      <nav class="bottom-nav" aria-label="Primary navigation">
        <button class="nav-item is-active" type="button" data-page="discovery">Discover</button>
        <button class="nav-item" type="button" data-page="top">Top</button>
        <button class="nav-item" type="button" data-page="new">New</button>
        <button class="nav-item" type="button" data-page="saved">Saved</button>
        <button class="nav-item" type="button" data-action="filters">Filters</button>
      </nav>
    </div>

    <div class="sheet-backdrop hidden" id="sheet-backdrop"></div>

    <aside class="sheet detail-sheet" id="detail-sheet" aria-hidden="true" aria-label="Entry details">
      <div class="sheet__handle"></div>
      <button class="sheet__close" id="detail-close" type="button" aria-label="Close details">Close</button>
      <div class="sheet__body" id="detail-body"></div>
    </aside>

    <aside class="sheet filter-sheet" id="filter-sheet" aria-hidden="true" aria-label="Filters">
      <div class="sheet__handle"></div>
      <div class="sheet__head">
        <div>
          <p class="eyebrow">Filters</p>
          <h2>Tune discovery</h2>
        </div>
        <button class="sheet__close sheet__close--inline" id="filter-close" type="button">Close</button>
      </div>
      <div class="sheet__body" id="filter-body"></div>
    </aside>

    <template id="card-template">
      <button class="entry-card glass-panel" type="button">
        <div class="entry-card__cover"></div>
        <div class="entry-card__body">
          <div class="entry-card__top">
            <span class="rank-pill"></span>
            <span class="lane-pill"></span>
          </div>
          <h3 class="entry-card__title"></h3>
          <div class="badge-row"></div>
          <div class="metric-row">
            <div><span>Fan Fav</span><strong class="metric-fan"></strong></div>
            <div><span>Mean</span><strong class="metric-score"></strong></div>
            <div><span>Pop</span><strong class="metric-pop"></strong></div>
          </div>
        </div>
      </button>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
